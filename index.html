<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Wife ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Fredoka', sans-serif;
    background:#3fa9f5;
    overflow:hidden;
}

/* BOOK */
.book {
    position:relative;
    width:100%;
    height:100vh;
    perspective:1500px;
}

.page {
    position:absolute;
    width:100%;
    height:100%;
    background:#cce7ff;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    transform-origin:left;
    transform:rotateY(180deg);
    transition:transform 0.8s ease;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.page.active { transform:rotateY(0deg); z-index:2; }
.page.flipped { transform:rotateY(-180deg); }

img {
    width:85%;
    max-width:320px;
    border-radius:20px;
}

.text {
    margin-top:20px;
    font-size:18px;
    min-height:160px;
    white-space:pre-line;
}

.controls {
    position:absolute;
    bottom:20px;
}

button {
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:12px;
    background:white;
    font-weight:bold;
}

/* CAKE */
.cake {
    position:absolute;
    bottom:80px;
    width:150px;
    height:150px;
    background:#ff69b4;
    border-radius:10px;
}

.candle {
    width:10px;
    height:50px;
    background:white;
    position:absolute;
    top:-50px;
    left:70px;
}

/* FLAME */
.flame {
    width:20px;
    height:30px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-30px;
    left:-5px;
    animation:flicker 0.2s infinite;
}

@keyframes flicker {
    0% { transform:scale(1); }
    50% { transform:scale(1.2); }
    100% { transform:scale(1); }
}

/* SMOKE */
.smoke {
    position:absolute;
    width:10px;
    height:10px;
    background:gray;
    border-radius:50%;
    opacity:0;
}

.smoke.show {
    animation:smokeUp 2s forwards;
}

@keyframes smokeUp {
    0% { transform:translateY(0); opacity:1;}
    100% { transform:translateY(-80px); opacity:0;}
}

/* HEARTS */
.heart {
    position:absolute;
    color:red;
    animation:float 5s linear infinite;
}
@keyframes float {
    from { transform:translateY(100vh); opacity:1;}
    to { transform:translateY(-10vh); opacity:0;}
}

/* STARS */
.star {
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    animation:shoot 2s linear infinite;
}
@keyframes shoot {
    from { transform:translate(0,0); opacity:1;}
    to { transform:translate(300px,300px); opacity:0;}
}

.music-btn {
    position:absolute;
    top:20px;
    right:20px;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="YOUR-MUSIC-LINK.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<div class="book">

<div class="page active">
<h2>Happy Birthday My Love ❤️</h2>
<img src="photo1.jpg">
<div class="text" id="text1"></div>
<div class="controls">
<button onclick="nextPage()">Next ➡️</button>
</div>
</div>

<div class="page">
<h2>Make a wish 🎂</h2>
<p>Blow into the mic 🎤</p>

<div class="cake">
<div class="candle">
<div class="flame" id="flame"></div>
<div class="smoke" id="smoke"></div>
</div>
</div>

<div class="controls">
<button onclick="prevPage()">⬅️ Back</button>
<button onclick="nextPage()">Next ➡️</button>
</div>
</div>

<div class="page">
<img src="photo2.jpg">
<div class="text" id="text3"></div>
<div class="controls">
<button onclick="prevPage()">⬅️ Back</button>
<button onclick="nextPage()">Next ➡️</button>
</div>
</div>

<div class="page">
<img src="photo3.jpg">
<div class="text" id="text4"></div>
<div class="controls">
<button onclick="prevPage()">⬅️ Back</button>
<button onclick="nextPage()">Next ➡️</button>
</div>
</div>

<div class="page">
<img src="photo4.jpg">
<div class="text" id="text5"></div>
<div class="controls">
<button onclick="prevPage()">⬅️ Back</button>
<button onclick="nextPage()">Next ➡️</button>
</div>
</div>

<div class="page">
<img src="photo5.jpg">
<div class="text" id="text6"></div>
<div class="controls">
<button onclick="prevPage()">⬅️ Back</button>
<button onclick="nextPage()">Next ➡️</button>
</div>
</div>

<div class="page">
<img src="photo6.jpg">
<div class="text" id="text7"></div>
<div class="controls">
<button onclick="prevPage()">⬅️ Back</button>
<button onclick="nextPage()">Next ➡️</button>
</div>
</div>

<div class="page">
<div class="text" id="text8"></div>
<div class="controls">
<button onclick="prevPage()">⬅️ Back</button>
<button onclick="finish()">Finish ❤️</button>
</div>
</div>

</div>

<script>
let currentPage=0;
const pages=document.querySelectorAll(".page");
let musicStarted=false;
let finalStarted=false;

function showPage(i){
    pages.forEach((p,index)=>{
        p.classList.remove("active","flipped");
        if(index<i) p.classList.add("flipped");
        if(index===i) p.classList.add("active");
    });

    if(i===7 && !finalStarted){
        startFinalEffects();
        finalStarted=true;
    }

    startTyping();
}

function nextPage(){ if(currentPage<pages.length-1){currentPage++;showPage(currentPage);} }
function prevPage(){ if(currentPage>0){currentPage--;showPage(currentPage);} }

function typeWriter(text,id,speed=25){
    let i=0; let el=document.getElementById(id);
    if(!el) return;
    el.innerHTML="";
    function t(){ if(i<text.length){ el.innerHTML+=text.charAt(i); i++; setTimeout(t,speed);} }
    t();
}

function startTyping(){
    if(currentPage===0){
        typeWriter("You make my life brighter every single day. This is our first birthday married, and I’m so lucky to call you my wife ❤️","text1");
    }
    if(currentPage===2){
        typeWriter("Happy 25th birthday to my WIFEEE. Ugh sorry, I meant 22nd 😉","text3");
    }
    if(currentPage===3){
        typeWriter("What a year it’s been since the last one ❤️","text4");
    }
    if(currentPage===4){
        typeWriter("We went shark cage diving 🦈","text5");
    }
    if(currentPage===5){
        typeWriter("On many trips together ✈️","text6");
    }
    if(currentPage===6){
        typeWriter("WE GOT MARRIED!!!!!!! 💍 And the best part is I get to spend every single day with you from now until forever ❤️","text7");
    }
    if(currentPage===7){
        typeWriter("I want to take this chance to tell you how proud I am of you...\n\nHappy birthday my gorgeous wife ❤️","text8",20);
    }
}

/* MIC + MUSIC SYNC */
const flame=document.getElementById("flame");
const smoke=document.getElementById("smoke");
const music=document.getElementById("music");

async function setupMic(){
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const ctx=new AudioContext();
    const mic=ctx.createMediaStreamSource(stream);
    const analyser=ctx.createAnalyser();

    mic.connect(analyser);
    analyser.fftSize=256;
    const data=new Uint8Array(analyser.frequencyBinCount);

    function detect(){
        analyser.getByteFrequencyData(data);
        let volume=data.reduce((a,b)=>a+b)/data.length;

        if(volume>60 && !flame.classList.contains("hidden")){
            flame.classList.add("hidden");
            smoke.classList.add("show");

            if(!musicStarted){
                music.play();
                musicStarted=true;
            }
        }
        requestAnimationFrame(detect);
    }
    detect();
}
setupMic();

/* RESET */
setInterval(()=>{
    flame.classList.remove("hidden");
    smoke.classList.remove("show");
},10000);

/* MUSIC BUTTON */
function toggleMusic(){
    music.paused ? music.play() : music.pause();
}

/* FINAL EFFECTS */
function startFinalEffects(){
    setInterval(()=>{
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*100+"vw";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),5000);
    },400);

    setInterval(()=>{
        let star=document.createElement("div");
        star.className="star";
        star.style.top=Math.random()*100+"vh";
        document.body.appendChild(star);
        setTimeout(()=>star.remove(),2000);
    },600);
}

function finish(){
    document.body.innerHTML="<h1 style='text-align:center;margin-top:40vh;color:white;'>I love you forever ❤️</h1>";
}
</script>

</body>
</html>
