<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Wife ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Fredoka', sans-serif;
    background:#3fa9f5;
    overflow:auto;
}

.book {
    position:relative;
    width:100%;
    height:100vh;
    perspective:2000px;
}

.page {
    position:absolute;
    width:100%;
    height:100%;
    background:#cce7ff;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    transform-origin:left;
    transform:rotateY(180deg);
    transition:0.7s;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
    backface-visibility:hidden;
}

.page.active { transform:rotateY(0); z-index:2; }
.page.flipped { transform:rotateY(-180deg); }

img {
    width:80%;
    max-width:300px;
    border-radius:20px;
}

.text {
    margin-top:20px;
    font-size:18px;
    white-space:pre-line;
    text-align:center;
}

.controls {
    position:absolute;
    bottom:20px;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:10px;
    margin:5px;
}

/* cake */
.cake {
    position:absolute;
    bottom:80px;
    width:140px;
    height:140px;
    background:#ff69b4;
    border-radius:10px;
}

.candle {
    width:10px;
    height:50px;
    background:white;
    position:absolute;
    top:-50px;
    left:65px;
}

.flame {
    width:20px;
    height:30px;
    background:radial-gradient(circle, yellow 20%, orange 60%, red);
    border-radius:50%;
    position:absolute;
    top:-30px;
    left:-5px;
    animation:flicker 0.15s infinite alternate;
}

@keyframes flicker {
    0% { transform: scale(1) rotate(-2deg); }
    100% { transform: scale(1.2) rotate(2deg); }
}

.hidden { display:none; }

.music-btn {
    position:absolute;
    top:20px;
    right:20px;
}
</style>

</head>

<body>

<audio id="music" loop>
<source src="YOUR-MUSIC-LINK.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<div class="book">

<!-- PAGE 1 -->

<div class="page active">
<h2>Happy Birthday My Love ❤️</h2>
<img src="photo1.jpg">
<div class="text" id="text1"></div>
<div class="controls">
<button onclick="nextPage()">Next ➡️</button>
</div>
</div>

<!-- PAGE 2 -->

<div class="page">
<h2>Make a wish 🎂</h2>
<p>Blow into the mic 🎤</p>

<div class="cake">
<div class="candle">
<div class="flame" id="flame"></div>
</div>
</div>

<div class="controls">
<button onclick="prevPage()">⬅️ Back</button>
<button onclick="nextPage()">Next ➡️</button>
</div>
</div>

<!-- OTHER PAGES -->

<div class="page"><img src="photo2.jpg"><div class="text" id="text3"></div><div class="controls"><button onclick="prevPage()">⬅️</button><button onclick="nextPage()">➡️</button></div></div>
<div class="page"><img src="photo3.jpg"><div class="text" id="text4"></div><div class="controls"><button onclick="prevPage()">⬅️</button><button onclick="nextPage()">➡️</button></div></div>
<div class="page"><img src="photo4.jpg"><div class="text" id="text5"></div><div class="controls"><button onclick="prevPage()">⬅️</button><button onclick="nextPage()">➡️</button></div></div>
<div class="page"><img src="photo5.jpg"><div class="text" id="text6"></div><div class="controls"><button onclick="prevPage()">⬅️</button><button onclick="nextPage()">➡️</button></div></div>
<div class="page"><img src="photo6.jpg"><div class="text" id="text7"></div><div class="controls"><button onclick="prevPage()">⬅️</button><button onclick="nextPage()">➡️</button></div></div>

<!-- FINAL -->

<div class="page">
<div class="text" id="text8"></div>
<div class="controls">
<button onclick="prevPage()">⬅️</button>
<button onclick="finish()">❤️</button>
</div>
</div>

</div>

<script>
let currentPage=0;
const pages=document.querySelectorAll(".page");
const flame=document.getElementById("flame");
const music=document.getElementById("music");

let musicStarted=false;
let typedPages={};

function showPage(i){
    pages.forEach((p,index)=>{
        p.classList.remove("active","flipped");
        if(index<i) p.classList.add("flipped");
        if(index===i) p.classList.add("active");
    });

    // reset flame
    if(i===1 && flame){
        flame.classList.remove("hidden");
    }

    startTyping();
}

function nextPage(){ if(currentPage<pages.length-1){currentPage++;showPage(currentPage);} }
function prevPage(){ if(currentPage>0){currentPage--;showPage(currentPage);} }

function typeWriter(text,id,speed=25){
    if(typedPages[id]) return;
    typedPages[id]=true;

    let i=0;
    let el=document.getElementById(id);
    if(!el) return;

    function t(){
        if(i<text.length){
            el.innerHTML+=text.charAt(i);
            i++;
            setTimeout(t,speed);
        }
    }
    t();
}

function startTyping(){
    if(currentPage===0){
        typeWriter("You make my life brighter every single day. This is our first birthday married, and I’m so lucky to call you my wife ❤️","text1");
    }
    if(currentPage===2){
        typeWriter("Happy 25th birthday to my WIFEEE. Ugh sorry, I meant 22nd 😉","text3");
    }
    if(currentPage===3){
        typeWriter("What a year it’s been since the last one ❤️","text4");
    }
    if(currentPage===4){
        typeWriter("We went shark cage diving 🦈","text5");
    }
    if(currentPage===5){
        typeWriter("On many trips together ✈️","text6");
    }
    if(currentPage===6){
        typeWriter("WE GOT MARRIED!!!!!!! 💍 And the best part is I get to spend every single day with you from now until forever ❤️","text7");
    }
    if(currentPage===7){
        typeWriter("I want to take this chance to tell you how proud I am of you...\n\nHappy birthday my gorgeous wife ❤️","text8");
    }
}

/* MIC IMPROVED */
async function setupMic(){
    try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        const ctx=new AudioContext();
        const mic=ctx.createMediaStreamSource(stream);
        const analyser=ctx.createAnalyser();

        mic.connect(analyser);
        analyser.fftSize=256;
        const data=new Uint8Array(analyser.frequencyBinCount);

        let blowStrength=0;

        function detect(){
            analyser.getByteFrequencyData(data);
            let volume=data.reduce((a,b)=>a+b)/data.length;

            if(volume>85){
                blowStrength++;
            } else {
                blowStrength=0;
            }

            if(blowStrength>5){
                flame.classList.add("hidden");

                // smoke effect
                const smoke=document.createElement("div");
                smoke.innerHTML="💨";
                smoke.style.position="absolute";
                smoke.style.top="-40px";
                smoke.style.left="-5px";
                smoke.style.fontSize="20px";
                flame.parentElement.appendChild(smoke);

                setTimeout(()=>smoke.remove(),1000);

                if(!musicStarted){
                    music.play();
                    musicStarted=true;
                }

                blowStrength=0;
            }

            requestAnimationFrame(detect);
        }
        detect();
    } catch(e){
        console.log("Mic blocked");
    }
}
setupMic();

/* music fallback */
document.body.addEventListener("click",()=>{
    if(!musicStarted){
        music.play();
        musicStarted=true;
    }
},{once:true});

function toggleMusic(){
    music.paused ? music.play() : music.pause();
}

function finish(){
    document.body.innerHTML=`
    <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;color:white;text-align:center;">
        <h1>I love you forever ❤️</h1>
        <p>You are my everything.</p>
        <p>Happy Birthday my wife 🎂</p>
    </div>`;
}
</script>

</body>
</html>
