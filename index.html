<style>
body {
    margin:0;
    font-family:'Fredoka', sans-serif;
    background:#3fa9f5;
    overflow:hidden;
}

.book {
    position:relative;
    width:100%;
    height:100vh;
    perspective:1200px;
}

.page {
    position:absolute;
    width:100%;
    height:100%;
    background:#cce7ff;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    transform-origin:left;
    transform:rotateY(180deg);
    transition:0.7s;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.page.active { transform:rotateY(0); z-index:2; }
.page.flipped { transform:rotateY(-180deg); }

img {
    width:80%;
    max-width:300px;
    border-radius:20px;
}

.text {
    margin-top:20px;
    font-size:18px;
    white-space:pre-line;
}

.controls {
    position:absolute;
    bottom:20px;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:10px;
    margin:5px;
}

/* cake */
.cake {
    position:absolute;
    bottom:80px;
    width:140px;
    height:140px;
    background:#ff69b4;
    border-radius:10px;
}

.candle {
    width:10px;
    height:50px;
    background:white;
    position:absolute;
    top:-50px;
    left:65px;
}

.flame {
    width:20px;
    height:30px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-30px;
    left:-5px;
    animation:flicker 0.2s infinite;
}

@keyframes flicker {
    50% { transform:scale(1.2); }
}

/* smoke effect */
.smoke {
    position:absolute;
    top:-40px;
    left:-5px;
    width:20px;
    height:20px;
    background:rgba(200,200,200,0.6);
    border-radius:50%;
    animation:rise 2s forwards;
}

@keyframes rise {
    0% { transform:translateY(0) scale(0.5); opacity:0.8; }
    100% { transform:translateY(-80px) scale(1.5); opacity:0; }
}

.hidden { display:none; }

.music-btn {
    position:absolute;
    top:20px;
    right:20px;
}
</style>
</head>

<script>
let currentPage=0;
const pages=document.querySelectorAll(".page");
const flame=document.getElementById("flame");
const music=document.getElementById("music");
let musicStarted=false;

function showPage(i){
    pages.forEach((p,index)=>{
        p.classList.remove("active","flipped");
        if(index<i) p.classList.add("flipped");
        if(index===i) p.classList.add("active");
    });
    startTyping();
}

function nextPage(){ if(currentPage<pages.length-1){currentPage++;showPage(currentPage);} }
function prevPage(){ if(currentPage>0){currentPage--;showPage(currentPage);} }

function typeWriter(text,id,speed=25){
    let i=0;
    let el=document.getElementById(id);
    if(!el) return;
    el.innerHTML="";
    function t(){
        if(i<text.length){
            el.innerHTML+=text.charAt(i);
            i++;
            setTimeout(t,speed);
        }
    }
    t();
}

function startTyping(){
    if(currentPage===0){
        typeWriter("You make my life brighter every single day. This is our first birthday married, and I’m so lucky to call you my wife ❤️","text1");
    }
    if(currentPage===2){
        typeWriter("Happy 25th birthday to my WIFEEE. Ugh sorry, I meant 22nd 😉","text3");
    }
    if(currentPage===3){
        typeWriter("What a year it’s been since the last one ❤️","text4");
    }
    if(currentPage===4){
        typeWriter("We went shark cage diving 🦈","text5");
    }
    if(currentPage===5){
        typeWriter("On many trips together ✈️","text6");
    }
    if(currentPage===6){
        typeWriter("WE GOT MARRIED!!!!!!! 💍 And the best part is I get to spend every single day with you from now until forever ❤️","text7");
    }
    if(currentPage===7){
        typeWriter("I want to take this chance to tell you how proud I am of you...\n\nHappy birthday my gorgeous wife ❤️","text8");
    }
}
